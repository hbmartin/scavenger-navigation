rules:
  - id: github-actions-pin-actions-to-sha
    languages:
      - generic
    severity: ERROR
    message: Pin third-party GitHub Actions to full commit SHAs instead of mutable version tags.
    paths:
      include:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
    pattern-regex: 'uses:\s+[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+@v[0-9]+(?:\.[0-9]+)*\b'

  - id: github-actions-explicit-permissions
    languages:
      - generic
    severity: WARNING
    message: Add an explicit top-level permissions block to GitHub Actions workflows.
    paths:
      include:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
    patterns:
      - pattern-regex: '(?m)^name:\s*'
      - pattern-not-regex: '(?m)^permissions:\s*'
